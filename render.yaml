databases:
  # 1. PostgreSQL Database
  - name: prism-db
    plan: free

services:
  # 2. Redis Cache & Queue (using KeyValue type per Render spec)
  - type: keyvalue
    name: prism-redis
    plan: free
    ipAllowList: [] # Only allow internal network connection for security

  # 3. FastAPI Web Service (Monolith Service running API + Celery Worker + Scheduler)
  - type: web
    name: prism-api
    env: docker
    dockerfilePath: infra/docker/Dockerfile.api
    dockerContext: .
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: prism-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: prism-redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false # Set in the Render Dashboard UI
      - key: JWT_SECRET_KEY
        generateValue: true # Generates a random cryptographically secure key automatically
      - key: RAZORPAY_KEY_ID
        sync: false # Set in the Render Dashboard UI (optional)
      - key: RAZORPAY_KEY_SECRET
        sync: false # Set in the Render Dashboard UI (optional)
